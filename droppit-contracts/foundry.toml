[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

# Deployment profile used by deploy.ps1 by default.
# Higher optimizer runs are useful for production deploy bytecode.
[profile.deploy]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 10_000

# Named RPC endpoints used by deployment scripts.
# You can use these aliases directly with forge:
#   forge script ... --rpc-url base-sepolia
#   forge script ... --rpc-url base
[rpc_endpoints]
base-sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_MAINNET_RPC_URL}"

# Verification API keys for Basescan across networks.
[etherscan]
base-sepolia = { key = "${BASESCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
